<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Помощник цирка</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f0f;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 16px;
  }

  .chat-container {
    width: 100%;
    max-width: 480px;
    height: 90vh;
    max-height: 720px;
    background: #1a1a1a;
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 24px 80px rgba(0,0,0,0.6);
  }

  .chat-header {
    background: #1f1f1f;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    border-bottom: 1px solid #2a2a2a;
  }

  .avatar {
    width: 44px;
    height: 44px;
    background: linear-gradient(135deg, #e63946, #c1121f);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }

  .header-info h2 {
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.2px;
  }

  .header-info p {
    color: #888;
    font-size: 13px;
    margin-top: 2px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    background: #4ade80;
    border-radius: 50%;
    display: inline-block;
    margin-right: 5px;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  .message {
    max-width: 82%;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.bot { align-self: flex-start; }
  .message.user { align-self: flex-end; }

  .bubble {
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.55;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .message.bot .bubble {
    background: #242424;
    color: #e8e8e8;
    border-bottom-left-radius: 4px;
  }

  .message.user .bubble {
    background: linear-gradient(135deg, #e63946, #c1121f);
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  .typing {
    align-self: flex-start;
    display: none;
  }

  .typing.active { display: flex; }

  .typing .bubble {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 14px 18px;
  }

  .dot {
    width: 6px;
    height: 6px;
    background: #666;
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-6px); }
  }

  .input-area {
    padding: 16px;
    background: #1f1f1f;
    border-top: 1px solid #2a2a2a;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  textarea {
    flex: 1;
    background: #2a2a2a;
    border: 1px solid #333;
    border-radius: 14px;
    color: #e8e8e8;
    font-size: 14px;
    font-family: inherit;
    padding: 12px 16px;
    resize: none;
    outline: none;
    max-height: 120px;
    min-height: 46px;
    line-height: 1.4;
    transition: border-color 0.2s;
  }

  textarea::placeholder { color: #555; }
  textarea:focus { border-color: #e63946; }

  .send-btn {
    width: 46px;
    height: 46px;
    background: linear-gradient(135deg, #e63946, #c1121f);
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.15s, opacity 0.15s;
  }

  .send-btn:hover { transform: scale(1.08); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .send-btn svg { width: 20px; height: 20px; fill: white; }

  .error-msg {
    background: #2d1a1a;
    border: 1px solid #5c2626;
    color: #f87171;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 13px;
    text-align: center;
  }
</style>
</head>
<body>

<div class="chat-container">
  <div class="chat-header">
    <div class="avatar">🎪</div>
    <div class="header-info">
      <h2>Помощник цирка</h2>
      <p><span class="status-dot"></span>Онлайн</p>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="message bot">
      <div class="bubble">Здравствуйте! 👋 Я виртуальный помощник цирка. Помогу с вопросами о билетах, расписании, льготах и возврате.</div>
    </div>
  </div>

  <div class="typing message" id="typing">
    <div class="bubble">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>
  </div>

  <div class="input-area">
    <textarea
      id="input"
      placeholder="Напишите вопрос..."
      rows="1"
      maxlength="1000"
    ></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
  const WEBHOOK_URL = 'https://n8n.tiplace.ru/webhook/a29f2cdd-ce34-415d-ac92-a01cc95cd417';

  // Читаем branch из URL: ?branch=15
  const params = new URLSearchParams(window.location.search);
  const widgetId = params.get('branch') || params.get('widget_id') || '';

  // Уникальный session_id для этой вкладки
  const sessionId = 'session-' + Math.random().toString(36).slice(2) + '-' + Date.now();

  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const typingEl = document.getElementById('typing');

  // Авторесайз textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

  // Отправка по Enter (Shift+Enter — перенос строки)
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function addMessage(text, role) {
    const div = document.createElement('div');
    div.className = `message ${role}`;

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    // Простое форматирование: **жирный** и *курсив*
    bubble.innerHTML = text
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/\\n/g, '\n');

    div.appendChild(bubble);
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function setTyping(show) {
    typingEl.classList.toggle('active', show);
    if (show) messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || sendBtn.disabled) return;

    addMessage(text, 'user');
    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;
    setTyping(true);

    try {
      const res = await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: text,
          session_id: sessionId,
          widget_id: widgetId
        })
      });

      const data = await res.json();
      const reply = data?.output || data?.text || data?.message || JSON.stringify(data);
      addMessage(reply, 'bot');
    } catch (err) {
      addMessage('⚠️ Не удалось получить ответ. Попробуйте ещё раз.', 'bot');
    } finally {
      setTyping(false);
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }
</script>

</body>
</html>
